<!DOCTYPE html>
<html>

<head>

<title>Language Translator</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css')}}">

</head>

<body>

<div class="container">

<h1>Language Translation Tool</h1>

<form method="POST">

<textarea
name="text"
placeholder="Enter Text"
required></textarea>

<label>Source Language</label>

<select name="source">

{% for language in languages %}

<option>{{language}}</option>

{% endfor %}

</select>

<label>Target Language</label>

<select name="target">

{% for language in languages %}

<option>{{language}}</option>

{% endfor %}

</select>

<button type="submit">
Translate
</button>

</form>

{% if translated %}

<h2>Translated Text</h2>

<div class="output">

{{translated}}

</div>

{% endif %}

</div>

</body>

</html>
